# Copy patterns into your real compose file. Named volume keeps uploads across image rebuilds.
# Usage: docker compose -f docker-compose.uploads.example.yml ... (adjust service name / build context)
services:
  api:
    build: .
    ports:
      - '5000:5000'
    environment:
      UPLOADS_DIR: /data/uploads
    volumes:
      - myaccounts_uploads:/data/uploads

volumes:
  myaccounts_uploads:
